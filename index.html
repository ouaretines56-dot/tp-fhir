<!DOCTYPE html>
<html>
<head>
    <title>Dashboard FHIR - Version Finale</title>
    <link rel="stylesheet" href="https://cdn.jsdelivr.net/npm/bootstrap@5.3.0/dist/css/bootstrap.min.css">
    <style>
        body { background-color: #f8f9fa; padding: 40px; }
        .section { background: white; padding: 20px; border-radius: 10px; box-shadow: 0 2px 5px rgba(0,0,0,0.1); margin-bottom: 20px; }
        h2 { color: #333; font-size: 1.5rem; margin-bottom: 15px; border-bottom: 2px solid #eee; padding-bottom: 5px; }
        .mesure-item { background: #e7f3ff; padding: 10px; border-radius: 5px; margin-bottom: 5px; list-style: none; border-left: 5px solid #007bff; }
    </style>
</head>
<body>
    <div class="container">
        <h1 class="text-center mb-5">Mon Dashboard FHIR</h1>

        <!-- ETAPE 1 : Création du patient (Avec le champ genre pour éviter l'erreur Python) -->
        <div class="section">
            <h2>Étape 1 : Créer le Patient</h2>
            <form action="/create_patient" method="POST" class="row g-2">
                <div class="col-md-4">
                    <input type="text" name="nom" class="form-control" placeholder="Nom" required>
                </div>
                <div class="col-md-4">
                    <input type="text" name="prenom" class="form-control" placeholder="Prénom" required>
                </div>
                <div class="col-md-2">
                    <select name="genre" class="form-select">
                        <option value="female">Féminin</option>
                        <option value="male">Masculin</option>
                        <option value="other">Autre</option>
                        <option value="unknown">Inconnu</option>
                    </select>
                </div>
                <div class="col-md-2">
                    <button type="submit" class="btn btn-success w-100">Créer</button>
                </div>
            </form>
        </div>

        <!-- ETAPE 2 : Ajout de la mesure -->
        <div class="section">
            <h2>Étape 2 : Ajouter une Fréquence Cardiaque</h2>
            <form action="/add_observation" method="POST" class="row g-2">
                <div class="col-md-5">
                    <input type="text" name="patient_id" class="form-control" placeholder="Coller l'ID ici (ex: 123)" required>
                </div>
                <div class="col-md-5">
                    <input type="number" name="valeur" class="form-control" placeholder="Ex: 75 (bpm)" required>
                </div>
                <div class="col-md-2">
                    <button type="submit" class="btn btn-warning text-white w-100">Ajouter</button>
                </div>
            </form>
        </div>

        <!-- ETAPE 3 : Dossier Complet -->
        <div class="section">
            <h2>Étape 3 : Voir le Dossier Complet</h2>
            <div class="input-group mb-3">
                <input type="text" id="idSearch" class="form-control" placeholder="Entrez l'ID du patient">
                <button class="btn btn-primary" onclick="chargerDossier()">Afficher</button>
            </div>
            
            <div id="zoneResultat" style="display:none; margin-top: 20px;">
                <h3 id="nomAffiche" class="h5 fw-bold text-primary"></h3>
                <hr>
                <ul id="listeObservations" class="p-0"></ul>
            </div>
        </div>
    </div>

    <script>
        function chargerDossier() {
            const id = document.getElementById('idSearch').value;
            const zone = document.getElementById('zoneResultat');
            const liste = document.getElementById('listeObservations');
            const titreNom = document.getElementById('nomAffiche');

            if(!id) { alert("Veuillez saisir un ID"); return; }

            fetch('/get_dossier/' + id.trim())
                .then(response => response.json())
                .then(data => {
                    if(data.error) {
                        alert("Erreur: " + data.error);
                        return;
                    }
                    
                    zone.style.display = 'block';
                    titreNom.innerText = "Dossier de : " + data.nom + " " + data.prenom;
                    liste.innerHTML = "";

                    if (data.observations.length === 0) {
                        liste.innerHTML = "<li class='text-muted text-center'>Aucune mesure trouvée pour ce patient.</li>";
                    } else {
                        data.observations.forEach(obs => {
                            liste.innerHTML += `
                                <li class="mesure-item">
                                    <strong>${obs.type}</strong> : ${obs.valeur} ${obs.unite}
                                </li>`;
                        });
                    }
                })
                .catch(err => {
                    console.error(err);
                    alert("Impossible de joindre le serveur Flask.");
                });
        }
    </script>
</body>
</html>
